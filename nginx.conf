# Vector//Drift - production Nginx server block.
# For use behind the nginx:alpine Docker container or on a bare Ubuntu 22.04 VPS.

server {
    listen 80;
    listen [::]:80;
    server_name vector-drift.org www.vector-drift.org;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (baseline, tighten as needed)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # SPA-style routing: try the exact URI, then as a directory, then fall
    # back to index.html so deep-links always resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Explicit AGPL source-offer redirect (short URL convenience).
    location = /source {
        return 302 /source.html;
    }
    location = /repo {
        return 302 https://github.com/vector-drift/vector-drift;
    }

    # Long-lived cache for fingerprinted static assets.
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Gzip.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Disable server tokens.
    server_tokens off;
}
